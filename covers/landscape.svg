<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#3d2a10"/>
      <stop offset="100%" stop-color="#0f0a05"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="beerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="30%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGrad)"/>

  <!-- Decorative hop circles -->
  <circle cx="200" cy="200" r="60" fill="#f59e0b" opacity="0.1"/>
  <circle cx="1720" cy="880" r="100" fill="#f59e0b" opacity="0.1"/>
  <circle cx="1800" cy="150" r="40" fill="#f59e0b" opacity="0.15"/>
  <circle cx="150" cy="900" r="80" fill="#f59e0b" opacity="0.1"/>

  <!-- Large beer mug on left -->
  <g transform="translate(380, 540)">
    <!-- Mug handle -->
    <path d="M 250 -220 Q 380 -220 380 -60 Q 380 100 250 100" fill="none" stroke="url(#titleGrad)" stroke-width="30"/>
    <!-- Mug body -->
    <rect x="-230" y="-260" width="480" height="520" rx="20" fill="#2a1a08" stroke="url(#titleGrad)" stroke-width="10"/>
    <!-- Beer liquid -->
    <rect x="-210" y="-180" width="440" height="420" fill="url(#beerGrad)"/>
    <!-- Foam -->
    <ellipse cx="10" cy="-180" rx="235" ry="45" fill="#fef3c7"/>
    <ellipse cx="-140" cy="-200" rx="50" ry="25" fill="#fef3c7"/>
    <ellipse cx="100" cy="-210" rx="60" ry="30" fill="#fef3c7"/>
    <ellipse cx="180" cy="-195" rx="40" ry="20" fill="#fef3c7"/>
    <!-- Bubbles -->
    <circle cx="-100" cy="0" r="12" fill="#fef3c7" opacity="0.7"/>
    <circle cx="50" cy="60" r="15" fill="#fef3c7" opacity="0.6"/>
    <circle cx="150" cy="100" r="10" fill="#fef3c7" opacity="0.7"/>
    <circle cx="-50" cy="150" r="18" fill="#fef3c7" opacity="0.5"/>
    <circle cx="120" cy="-50" r="8" fill="#fef3c7" opacity="0.8"/>
  </g>

  <!-- Title -->
  <text x="1150" y="460" font-family="Georgia, serif" font-weight="900" font-size="140" fill="url(#titleGrad)" filter="url(#glow)" text-anchor="middle">BeerFriends</text>
  <text x="1150" y="590" font-family="Georgia, serif" font-style="italic" font-weight="700" font-size="80" fill="#fef3c7" text-anchor="middle">Brewery Tycoon</text>

  <!-- Tagline -->
  <text x="1150" y="710" font-family="Arial, sans-serif" font-size="42" fill="#d4a574" text-anchor="middle">Tap. Brew. Empire.</text>

  <!-- Feature pills -->
  <g transform="translate(1150, 810)">
    <rect x="-380" y="0" width="220" height="60" rx="30" fill="#2a1a08" stroke="#f59e0b" stroke-width="3"/>
    <text x="-270" y="40" font-family="Arial, sans-serif" font-weight="700" font-size="26" fill="#fef3c7" text-anchor="middle">🍺 Idle Game</text>

    <rect x="-140" y="0" width="280" height="60" rx="30" fill="#2a1a08" stroke="#f59e0b" stroke-width="3"/>
    <text x="0" y="40" font-family="Arial, sans-serif" font-weight="700" font-size="26" fill="#fef3c7" text-anchor="middle">⬆️ 30+ Upgrades</text>

    <rect x="160" y="0" width="220" height="60" rx="30" fill="#2a1a08" stroke="#f59e0b" stroke-width="3"/>
    <text x="270" y="40" font-family="Arial, sans-serif" font-weight="700" font-size="26" fill="#fef3c7" text-anchor="middle">⭐ Prestige</text>
  </g>
</svg>
