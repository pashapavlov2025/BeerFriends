<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1200" viewBox="0 0 800 1200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#3d2a10"/>
      <stop offset="100%" stop-color="#0f0a05"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="beerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="30%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="1200" fill="url(#bgGrad)"/>

  <!-- Decorative bubbles -->
  <circle cx="80" cy="100" r="40" fill="#f59e0b" opacity="0.1"/>
  <circle cx="720" cy="200" r="50" fill="#f59e0b" opacity="0.1"/>
  <circle cx="100" cy="1050" r="60" fill="#f59e0b" opacity="0.1"/>
  <circle cx="700" cy="1100" r="35" fill="#f59e0b" opacity="0.15"/>

  <!-- Title at top -->
  <text x="400" y="140" font-family="Georgia, serif" font-weight="900" font-size="90" fill="url(#titleGrad)" filter="url(#glow)" text-anchor="middle">BeerFriends</text>
  <text x="400" y="210" font-family="Georgia, serif" font-style="italic" font-weight="700" font-size="54" fill="#fef3c7" text-anchor="middle">Brewery Tycoon</text>

  <!-- Beer mug center -->
  <g transform="translate(400, 680)">
    <!-- Handle -->
    <path d="M 190 -180 Q 300 -180 300 -40 Q 300 100 190 100" fill="none" stroke="url(#titleGrad)" stroke-width="24"/>
    <!-- Mug body -->
    <rect x="-190" y="-220" width="380" height="440" rx="16" fill="#2a1a08" stroke="url(#titleGrad)" stroke-width="8"/>
    <!-- Beer liquid -->
    <rect x="-174" y="-150" width="348" height="354" fill="url(#beerGrad)"/>
    <!-- Foam -->
    <ellipse cx="0" cy="-150" rx="180" ry="36" fill="#fef3c7"/>
    <ellipse cx="-110" cy="-170" rx="40" ry="22" fill="#fef3c7"/>
    <ellipse cx="80" cy="-175" rx="50" ry="26" fill="#fef3c7"/>
    <ellipse cx="140" cy="-160" rx="32" ry="18" fill="#fef3c7"/>
    <!-- Bubbles -->
    <circle cx="-80" cy="20" r="10" fill="#fef3c7" opacity="0.7"/>
    <circle cx="40" cy="80" r="12" fill="#fef3c7" opacity="0.6"/>
    <circle cx="120" cy="100" r="8" fill="#fef3c7" opacity="0.7"/>
    <circle cx="-40" cy="140" r="14" fill="#fef3c7" opacity="0.5"/>
    <circle cx="100" cy="-30" r="7" fill="#fef3c7" opacity="0.8"/>
  </g>

  <!-- Tagline -->
  <text x="400" y="1020" font-family="Arial, sans-serif" font-weight="700" font-size="44" fill="#d4a574" text-anchor="middle">Tap. Brew. Empire.</text>

  <!-- Feature pills -->
  <g transform="translate(400, 1080)">
    <rect x="-320" y="0" width="200" height="56" rx="28" fill="#2a1a08" stroke="#f59e0b" stroke-width="3"/>
    <text x="-220" y="37" font-family="Arial, sans-serif" font-weight="700" font-size="22" fill="#fef3c7" text-anchor="middle">🍺 Idle</text>

    <rect x="-100" y="0" width="200" height="56" rx="28" fill="#2a1a08" stroke="#f59e0b" stroke-width="3"/>
    <text x="0" y="37" font-family="Arial, sans-serif" font-weight="700" font-size="22" fill="#fef3c7" text-anchor="middle">⬆️ Upgrades</text>

    <rect x="120" y="0" width="200" height="56" rx="28" fill="#2a1a08" stroke="#f59e0b" stroke-width="3"/>
    <text x="220" y="37" font-family="Arial, sans-serif" font-weight="700" font-size="22" fill="#fef3c7" text-anchor="middle">⭐ Prestige</text>
  </g>
</svg>
