<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="80%">
      <stop offset="0%" stop-color="#3a240f"/>
      <stop offset="50%" stop-color="#1a0f00"/>
      <stop offset="100%" stop-color="#0a0500"/>
    </radialGradient>
    <linearGradient id="beer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fde68a"/>
      <stop offset="20%" stop-color="#fcd34d"/>
      <stop offset="70%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <radialGradient id="foam" cx="50%" cy="60%" r="60%">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="80%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Wood plank floor hints -->
  <g opacity="0.28">
    <rect x="0" y="500" width="1200" height="130" fill="#3a240f"/>
    <line x1="0" y1="530" x2="1200" y2="530" stroke="#1a0f00" stroke-width="3"/>
    <line x1="0" y1="560" x2="1200" y2="560" stroke="#1a0f00" stroke-width="3"/>
    <line x1="0" y1="590" x2="1200" y2="590" stroke="#1a0f00" stroke-width="3"/>
  </g>

  <!-- Glow behind mug -->
  <ellipse cx="600" cy="340" rx="260" ry="210" fill="#f59e0b" opacity="0.22" filter="url(#glow)"/>

  <!-- Beer mug: body -->
  <g transform="translate(460, 180)">
    <!-- Handle -->
    <path d="M 280 90 C 340 90, 340 260, 280 260" stroke="#78350f" stroke-width="14" fill="none" stroke-linecap="round"/>
    <!-- Body -->
    <rect x="10" y="60" width="280" height="260" rx="16" fill="url(#beer)" stroke="#78350f" stroke-width="8"/>
    <!-- Bubbles inside -->
    <circle cx="80"  cy="150" r="10" fill="#fde68a" opacity="0.7"/>
    <circle cx="120" cy="210" r="7"  fill="#fde68a" opacity="0.6"/>
    <circle cx="200" cy="170" r="8"  fill="#fde68a" opacity="0.7"/>
    <circle cx="230" cy="240" r="9"  fill="#fde68a" opacity="0.6"/>
    <!-- Highlight -->
    <rect x="30" y="80" width="20" height="200" rx="8" fill="#ffffff" opacity="0.3"/>
    <!-- Foam cap -->
    <ellipse cx="150" cy="60" rx="150" ry="42" fill="url(#foam)" stroke="#78350f" stroke-width="6"/>
    <circle cx="60"  cy="40" r="28" fill="url(#foam)" stroke="#78350f" stroke-width="4"/>
    <circle cx="110" cy="24" r="32" fill="url(#foam)" stroke="#78350f" stroke-width="4"/>
    <circle cx="170" cy="22" r="30" fill="url(#foam)" stroke="#78350f" stroke-width="4"/>
    <circle cx="220" cy="32" r="26" fill="url(#foam)" stroke="#78350f" stroke-width="4"/>
  </g>

  <!-- Title -->
  <text x="600" y="80" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="72" font-weight="900" fill="url(#gold)"
        stroke="#78350f" stroke-width="2">
    BeerFriends
  </text>
  <text x="600" y="130" text-anchor="middle" font-family="Georgia, serif"
        font-size="28" font-weight="700" fill="#fde68a" letter-spacing="6">
    BREWERY TYCOON
  </text>

  <!-- Tagline -->
  <text x="600" y="565" text-anchor="middle" font-family="Georgia, serif"
        font-size="26" font-weight="600" fill="#fcd34d">
    Tap. Brew. Prestige.
  </text>
  <text x="600" y="598" text-anchor="middle" font-family="Georgia, serif"
        font-size="18" fill="#d4a574">
    An idle brewing simulation
  </text>
</svg>
